<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Need a Bracelet?</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Rubik+Bubbles&family=Patrick+Hand&display=swap" rel="stylesheet">
<style>
  @page { size: 8.5in 11in; margin: 0; }

  :root {
    --pink:    #ff66b2;
    --purple:  #9b51e0;
    --blue:    #2db6ff;
    --green:   #43c95b;
    --yellow:  #ffd23f;
    --red:     #ef3e3e;
    --silver:  #b8bcc4;
    --ink:     #1f1d2b;
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }

  body {
    font-family: "Patrick Hand", "Comic Sans MS", system-ui, sans-serif;
    color: var(--ink);
    background: #eee;
  }

  .page {
    width: 8.5in;
    height: 11in;
    margin: 0 auto;
    padding: 0.75in;
    background: #fff;
  }

  h1.title {
    font-family: "Rubik Bubbles", "Comic Sans MS", cursive;
    font-size: 105px;
    line-height: 1;
    margin: 0 0 30px;
    letter-spacing: 1px;
    white-space: nowrap;
  }
  h1 .l { display: inline-block; }
  h1 .l:nth-child(1) { color: var(--red); }
  h1 .l:nth-child(2) { color: var(--yellow); }
  h1 .l:nth-child(3) { color: var(--green); }
  h1 .l:nth-child(4) { color: var(--blue); }
  h1 .l:nth-child(5) { color: var(--purple); }
  h1 .l:nth-child(6) { color: var(--pink); }
  h1 .l:nth-child(7) { color: var(--red); }
  h1 .l:nth-child(8) { color: var(--yellow); }
  h1 .l:nth-child(9) { color: var(--green); }
  h1 .l:nth-child(10){ color: var(--blue); }
  h1 .l:nth-child(11){ color: var(--purple); }
  h1 .l:nth-child(12){ color: var(--pink); }
  h1 .l:nth-child(13){ color: var(--red); }

  .line {
    font-size: 38px;
    line-height: 1.3;
    margin: 14px 0;
  }
  .line.indent { margin-left: 1in; }
  .line.center-ish { margin-left: 1.6in; }

  .beads {
    font-size: 30px;
    line-height: 1.6;
    margin-top: 28px;
  }
  .beads .label { font-weight: bold; }

  .swatch {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    margin-right: 4px;
  }
  .bead {
    display: inline-block;
    width: 22px; height: 22px;
    border-radius: 50%;
    border: 2px solid var(--ink);
    box-shadow: inset -3px -4px 6px rgba(0,0,0,.25);
    vertical-align: middle;
  }
  .bead.red    { background: radial-gradient(circle at 30% 30%, #ff8a8a, var(--red)); }
  .bead.green  { background: radial-gradient(circle at 30% 30%, #8af3b6, var(--green)); }
  .bead.pink   { background: radial-gradient(circle at 30% 30%, #ffb1d2, var(--pink)); }
  .bead.blue   { background: radial-gradient(circle at 30% 30%, #9ee6ff, var(--blue)); }
  .bead.yellow { background: radial-gradient(circle at 30% 30%, #ffe98a, var(--yellow)); }
  .bead.silver { background: radial-gradient(circle at 30% 30%, #ffffff, var(--silver)); }
  .bead.purple { background: radial-gradient(circle at 30% 30%, #d4b1ff, var(--purple)); }
  .bead.white  { background: radial-gradient(circle at 30% 30%, #ffffff, #ececec); }
</style>
</head>
<body>
  <div class="page">

    <h1 class="title">
      <span class="l">N</span><span class="l">E</span><span class="l">E</span><span class="l">D</span>
      &nbsp;<span class="l">A</span>
      <br/>
      <span class="l">B</span><span class="l">R</span><span class="l">A</span><span class="l">C</span><span class="l">E</span><span class="l">L</span><span class="l">E</span><span class="l">T</span>
    </h1>

    <p class="line">Go to Liza Love's Locker</p>

    <p class="line center-ish">$1 each</p>

    <p class="line" style="margin-top: 36px;">
      Will be made in less than two days and delivered to your locker
    </p>

    <div class="beads">
      <p>
        <span class="label">Big Beads =</span>
        <span class="swatch"><span class="bead red"></span>Red</span>,
        <span class="swatch"><span class="bead green"></span>Green</span>,
        <span class="swatch"><span class="bead pink"></span>Pink</span>,
        <span class="swatch"><span class="bead blue"></span>Blue</span>,
        <span class="swatch"><span class="bead yellow"></span>Yellow</span>,
        <span class="swatch"><span class="bead silver"></span>Silver</span>
      </p>
      <p>
        <span class="label">Small beads =</span>
        <span class="swatch"><span class="bead red"></span>Red</span>,
        <span class="swatch"><span class="bead pink"></span>Pink</span>,
        <span class="swatch"><span class="bead blue"></span>Blue</span>,
        <span class="swatch"><span class="bead green"></span>Green</span>,
        <span class="swatch"><span class="bead purple"></span>Purple</span>,
        <span class="swatch"><span class="bead white"></span>White</span>
      </p>
    </div>

  </div>
</body>
</html>
