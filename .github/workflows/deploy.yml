name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # Build main study app
      - run: npm ci
      - run: npm run build

      # Build animal hospital app
      - name: Install hospital dependencies
        run: npm ci
        working-directory: animal-hospital

      - name: Build hospital app
        run: npm run build
        working-directory: animal-hospital

      # Merge hospital build into main dist under /hospital/
      - name: Merge hospital build into dist
        run: cp -r animal-hospital/dist dist/hospital

      - uses: actions/configure-pages@v4

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - id: deployment
        uses: actions/deploy-pages@v4
